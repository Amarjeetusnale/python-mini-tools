name: CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show Python Version
        run: python --version

      - name: Run Hello Script
        run: |
          echo "Hello from GitHub Actions CI/CD Pipeline"
      - name: List Repository Files
        run: ls -la
